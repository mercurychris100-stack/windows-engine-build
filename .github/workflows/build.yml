name: Build Windows Application
on: [push]

jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Stable Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install All Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Windows Executable
      # Re-injected --noconsole to permanently hide the black terminal 
window on launch
      run: pyinstaller --onefile --noconsole --clean --paths=. 
--log-level=WARN engine.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe

