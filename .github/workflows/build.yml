name: Build Windows Application
on: [push]

jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Native Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Base Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas aiohttp websockets

    - name: Build Windows Executable
      # Notice we explicitly pass your full folder name to --hidden-import
      run: pyinstaller --onefile --clean --paths=. 
--hidden-import=websockets --hidden-import=aiohttp 
--hidden-import=pocketoptionapi_async engine.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe

