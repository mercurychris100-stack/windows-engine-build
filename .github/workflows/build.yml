name: Build Windows Application
on: [push]

jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Native Python 3.10
      uses: actions/setup-python@v5
      with:
        # Pins the latest micro-patch of 3.10 to prevent the base 3.10.0 
bug
        python-version: '3.10.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.3.0

    - name: Install Requirements Natively
      # --only-binary=:all: pulls pre-built Windows wheels for 
pandas/numpy
      run: pip install --only-binary=:all: -r requirements.txt

    - name: Build Windows Executable
      # --noconsole hides the black command prompt box permanently on 
Windows
      run: pyinstaller --onefile --noconsole --clean --paths=. engine.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe

