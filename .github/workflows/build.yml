name: Build Windows Application
on: [push]

jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Native Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Base Tooling
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Install Requirements Safely
      # --only-binary=:all: forces pip to download pre-compiled versions 
of pandas/numpy 
      # instead of compiling them from scratch, preventing the build 
crash.
      run: pip install --only-binary=:all: -r requirements.txt

    - name: Build Windows Executable
      # Re-adding the noconsole flag to completely hide the black popup 
window
      run: pyinstaller --onefile --noconsole --clean --paths=. engine.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe

