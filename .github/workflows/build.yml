name: Build Windows Application
on: [push]

jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Native Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Base Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas aiohttp websockets

    - name: Build Windows Executable
      # --collect-all explicitly deep-scans your local folder to pack 
every file, metadata, and script inside it
      run: pyinstaller --onefile --clean --paths=. --collect-all 
pocketoptionapi_async --hidden-import=websockets --hidden-import=aiohttp 
engine.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe

