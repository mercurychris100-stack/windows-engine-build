name: Build Windows Application
on: [push]
jobs:
  compile-exe:
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
    - name: Set up Native Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.11'
    - name: Install Tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.3.0 pyarmor
    - name: Install Requirements
      run: |
        pip install --only-binary=:all: -r requirements.txt
    - name: Obfuscate with Pyarmor
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        pyarmor cfg encoding="utf-8"
        pyarmor gen engine.py
    - name: Build Windows Executable
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        pyinstaller engine.spec
    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/engine.exe
